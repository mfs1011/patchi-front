services:
    node:
        container_name: ${DOCKER_PROJECT_NAME}_node
        image: node:20.12.2-buster
        volumes:
            - ./:/var/www/html
        working_dir: /var/www/html
        command: /bin/sh -c "
            echo 'npm version:' &&
            npm -v &&
            echo 'node version:' &&
            node -v &&
            echo '-----------' &&
            npm install &&
            npm run build"

